<header class="app-header">
  <div>
    <h1>{{ title }}</h1>
    <p *ngIf="subtitle">{{ subtitle }}</p>
  </div>

  <div class="user-area" *ngIf="currentUser">
    <div class="user-info">
      <strong>{{ currentUser.prenom }} {{ currentUser.nom }}</strong>
      <span>{{ currentUser.role }}</span>
    </div>

    <button class="logout-button" (click)="logout()">
      Déconnexion
    </button>
  </div>
</header>
