<div class="login-page">
  <div class="login-card">
    <h1>Connexion</h1>

    <p class="subtitle">
      Connectez-vous pour accéder à votre espace.
    </p>

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          name="email"
          [(ngModel)]="email"
          placeholder="client@test.com"
          required
        />
      </div>

      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input
          id="password"
          type="password"
          name="password"
          [(ngModel)]="password"
          placeholder="password"
          required
        />
      </div>

      <p class="error" *ngIf="errorMessage">
        {{ errorMessage }}
      </p>

      <button type="submit" class="login-button">
        Se connecter
      </button>
    </form>

    <div class="demo-section">
      <p>Comptes de démonstration</p>

      <button type="button" (click)="loginAsClient()" class="demo-button">
        Connexion client
      </button>

      <button type="button" (click)="loginAsSupport()" class="demo-button support">
        Connexion support
      </button>
    </div>
  </div>
</div>
